# Drop into your workspace's .continue/mcpServers/ directory.
#
# Prereq: the rg binary must be installed (see README):
#     uv tool install ripgrep
#
# Then in Continue's Agent tool settings:
#   * set the built-in  Grep search  policy to  Excluded
#   * set the built-in  Glob search  policy to  Excluded
#   * set  search.grep / search.files  to  Automatic  (read-only; safe to auto-run)
name: search
version: 0.0.1
schema: v1
mcpServers:
  - name: search
    command: /absolute/path/to/uv
    # --project pins the server's uv environment to its package dir, so `cwd` is
    # NOT needed for the server itself. Set MCP_WORKSPACE to your workspace root:
    # it's the base for relative paths.
    args: ["run", "--no-sync", "--project", "/absolute/path/to/continue-mcp/search-mcp", "search-mcp"]
    env:
      MCP_WORKSPACE: /absolute/path/to/your/workspace
      SEARCH_MCP_TIMEOUT: "30"        # seconds per search before it's killed
      SEARCH_MCP_MAX_RESULTS: "1000"  # hard cap so a broad query can't flood context
      # RIPGREP_BIN: /custom/path/to/rg   # optional: pin the rg binary explicitly
