# Drop this into your workspace's .continue/mcpServers/ directory.
# Then, in Continue's Agent tool settings:
#   * set the built-in  run_terminal_command  policy to  Excluded
#   * set  shell.start / shell.run / shell.kill ... to  Ask First (or Automatic
#     once you trust them)
name: shell
version: 0.0.1
schema: v1
mcpServers:
  - name: shell
    command: /absolute/path/to/uv
    # --project pins the server's uv environment to its package dir, so `cwd` is
    # NOT needed for the server itself. Set MCP_WORKSPACE to your workspace root:
    # it's the base for relative paths and the default working dir for commands.
    args: ["run", "--no-sync", "--project", "/absolute/path/to/continue-mcp/shell-mcp", "shell-mcp"]
    # Continue aborts the initial connect after a short default; a cold first
    # launch (interpreter start + fastmcp import, slower under corp antivirus)
    # can exceed it and show as "Connection timed out". Give it generous room.
    connectionTimeout: 120000    # ms
    env:
      MCP_WORKSPACE: /absolute/path/to/your/workspace
      SHELL_MCP_DEFAULT_TIMEOUT: "120"    # seconds; server kills + reports on deadline
      SHELL_MCP_MAX_BUFFER: "262144"      # per-stream byte cap before mid-truncation
