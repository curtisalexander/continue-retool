# Drop into your workspace's .continue/mcpServers/ directory.
#
# IMPORTANT: when you use the gateway, register ONLY this file with Continue.
# Do NOT also add shell.yaml / search.yaml / edit.yaml — the gateway connects to
# those downstream servers itself. Adding them to Continue too would re-load all
# their schemas and defeat the entire token-saving purpose.
#
# You still Exclude the built-in Continue tools you're replacing
# (run_terminal_command, Grep/Glob search, Edit/Create file). Their replacements
# now live behind the gateway, reachable via gateway.search -> describe -> call.
name: gateway
version: 0.0.1
schema: v1
mcpServers:
  - name: gateway
    command: /absolute/path/to/uv
    # --project pins every server to the toolkit's shared uv environment, so `cwd` is
    # NOT needed for the server itself. Set MCP_WORKSPACE to your workspace root:
    # it's the base for relative paths.
    args: ["run", "--no-sync", "--project", "/absolute/path/to/continue-mcp", "gateway-mcp"]
    # Continue aborts the initial connect after a short default; a cold first
    # launch (interpreter start + fastmcp import, slower under corp antivirus)
    # can exceed it and show as "Connection timed out". Give it generous room.
    connectionTimeout: 120000    # ms
    env:
      MCP_WORKSPACE: /absolute/path/to/your/workspace
      GATEWAY_CONFIG: /absolute/path/to/gateway.config.json
