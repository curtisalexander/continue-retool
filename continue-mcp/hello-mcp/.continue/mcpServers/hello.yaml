# Enablement check. Drop into your workspace's .continue/mcpServers/ directory,
# reload Continue, open Agent mode, and ask it to call the `ping` tool.
#   * "pong" back  -> MCP is enabled; proceed to shell-mcp.
#   * tool missing -> MCP is disabled or config is locked by IT. Stop and find out.
name: hello
version: 0.0.1
schema: v1
mcpServers:
  - name: hello
    command: /absolute/path/to/uv
    # --project pins every server to the toolkit's shared uv environment, so `cwd` is
    # NOT needed for the server itself. Set MCP_WORKSPACE to your workspace root:
    # it's the base for relative paths.
    args: ["run", "--no-sync", "--project", "/absolute/path/to/continue-mcp", "hello-mcp"]
    # Continue aborts the initial connect after a short default; a cold first
    # launch (interpreter start + fastmcp import, slower under corp antivirus)
    # can exceed it and show as "Connection timed out". Give it generous room.
    connectionTimeout: 120000    # ms
    env:
      MCP_WORKSPACE: /absolute/path/to/your/workspace
