# Drop this into your workspace's .continue/mcpServers/ directory, and copy
# ../rules/notes.md into .continue/rules/ — the rule is what makes the agent
# actually consult its notes; the server just stores them.
#
# Policies: notes.list / notes.read -> Automatic; notes.write / notes.delete ->
# Automatic once trusted (they only touch <repo>/.continue-notes/).
name: notes
command: uv
# --project pins the server's uv environment to its package dir, so `cwd` is
# NOT needed for the server itself. Set MCP_WORKSPACE to your workspace root:
# notes are stored at the enclosing repo's root, found by walking up from it.
args: ["run", "--project", "/absolute/path/to/continue-mcp/notes-mcp", "notes-mcp"]
env:
  MCP_WORKSPACE: /absolute/path/to/your/workspace
  # NOTES_MCP_DIRNAME: .continue-notes   # storage dirname at the repo root
