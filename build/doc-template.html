<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title$ — continue-retool</title>
<style>
  :root{
    --bg:#0d1117; --panel:#141b24; --panel2:#1b2430; --ink:#e6edf3; --muted:#9fb0c0;
    --line:#243140; --accent:#5db0ff; --accent2:#7ee787; --warn:#ffb454; --purple:#d2a8ff;
    --chip:#1f2a37; --max:900px;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0; background:linear-gradient(180deg,#0b0f14,#0d1117 320px); color:var(--ink);
    font-family:var(--sans); line-height:1.65; font-size:16.5px; -webkit-font-smoothing:antialiased}
  a{color:var(--accent); text-decoration:none}
  a:hover{text-decoration:underline}

  header{padding:56px 22px 22px; max-width:var(--max); margin:0 auto}
  .kicker{font-family:var(--mono); font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); margin-bottom:14px}
  .kicker a{color:var(--accent)}
  header h1{font-family:var(--serif); font-size:clamp(30px,5vw,50px); margin:0 0 6px; font-weight:600; letter-spacing:-.02em; line-height:1.1}

  main{max-width:var(--max); margin:0 auto; padding:8px 22px 80px}
  main h1{font-family:var(--serif); font-size:30px; margin:2.4em 0 .4em; font-weight:600; letter-spacing:-.01em}
  h2{font-family:var(--serif); font-size:25px; margin:2em 0 .5em; font-weight:600; padding-bottom:.3rem; border-bottom:1px solid var(--line)}
  h3{font-size:19px; margin:1.6em 0 .3em; color:var(--accent2); font-weight:600}
  h4{font-size:16px; margin:1.4em 0 .2em; color:var(--purple); font-weight:600}
  p{max-width:80ch}
  ul,ol{max-width:80ch}
  li{margin:.25em 0}
  strong{color:#fff}
  hr{border:0; border-top:1px solid var(--line); margin:2.2em 0}

  code{font-family:var(--mono); font-size:.88em; background:var(--chip); border:1px solid var(--line);
    border-radius:5px; padding:1px 5px; color:var(--accent2)}
  pre{background:#0a0e13; border:1px solid var(--line); border-radius:11px; padding:16px 18px;
    overflow:auto; font-size:13.5px; line-height:1.5; max-width:100%}
  pre code{background:none; border:0; padding:0; color:var(--ink); font-size:13.5px}

  blockquote{margin:1.4em 0; padding:.5em 1.1em; border-left:4px solid var(--warn);
    background:var(--panel); border-radius:0 9px 9px 0; color:var(--muted)}
  blockquote p{margin:.4em 0}

  table{border-collapse:collapse; margin:1.4em 0; font-size:14.5px; width:100%; display:block; overflow-x:auto}
  th,td{border:1px solid var(--line); padding:8px 12px; text-align:left; vertical-align:top}
  th{background:var(--panel2); color:#fff; font-family:var(--sans)}
  tr:nth-child(even) td{background:var(--panel)}

  nav#TOC{background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px 20px; margin:1.6em 0 2em; font-size:14.5px}
  nav#TOC::before{content:"On this page"; display:block; font-family:var(--mono); font-size:11px;
    letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:8px}
  nav#TOC ul{list-style:none; margin:0; padding-left:0}
  nav#TOC ul ul{padding-left:16px}
  nav#TOC li{margin:.15em 0}

  footer{max-width:var(--max); margin:0 auto; padding:24px 22px 70px; color:var(--muted); font-size:13.5px;
    border-top:1px solid var(--line)}
  footer a{color:var(--muted); text-decoration:underline}
</style>
</head>
<body>
<header>
  <div class="kicker"><a href="./index.html">&larr; continue-retool</a></div>
  <h1>$title$</h1>
</header>
<main>
$if(toc)$
$toc$
$endif$
$body$
</main>
<footer>
  Part of <a href="https://github.com/curtisalexander/continue-retool">continue-retool</a> —
  retooling Continue with our own tools. MIT licensed.
</footer>
</body>
</html>
